<body>
<div class="container">

                <div class="info-field"><label>英文名/拼音</label><input type="text" id="stuPinyin" placeholder="例: An Xin" value="An Xin"></div>

                <div class="info-field"><label>就读起止</label><input type="text" id="stuDuration" placeholder="09-2024 至 今  或 09-2022 至 07-2025" value="09-2022 至 07-2025"></div>

            <button id="batchExportZipBtn" class="btn-success">📦 批量导出所有学生(ZIP)</button>

        <div id="previewContainer" class="preview-area"></div>
    </div>
    <footer>说明：支持上传.xlsx/.xls/.csv，智能解析成绩数据（科目列+成绩列，或第一列为科目自动寻找数字分数）。无成绩显示"—"。日期格式：中文年月日，英文月日年。</footer>

<script>
    // ---------- 科目映射库 ----------
    const subjectMap = {
        "生物":"Biology","语文":"Chinese","英语":"English","数学":"Math","体育":"PE",
        "物理":"Physics","化学":"Chemistry","地理":"Geography","政治":"Politics","音乐":"Music",
        "美术":"Arts","计算机":"IT","法语":"French","语法":"Grammar","社会学":"Sociology",
        "文学":"Literature","西班牙语":"Spanish","自习":"Self-study","历史":"History",
        "经济":"Economics","统计":"Statistics","几何":"Geometry","代数":"Algebra",
        "生物一册":"Biology 1","生物二册":"Biology 2","物理一册":"Physics 1","物理二册":"Physics 2",
        "化学一册":"Chemistry 1","化学二册":"Chemistry 2","语文一册":"Chinese 1","语文二册":"Chinese 2",
        "英语读写1级":"English Reading&Writing 1","英语读写2级":"English Reading&Writing 2",
        "英语读写3级":"English Reading&Writing 3","英语读写4级":"English Reading&Writing 4",
        "英语听说1级":"English Listening&Speaking 1","英语听说2级":"English Listening&Speaking 2",
        "英语听说3级":"English Listening&Speaking 3","英语听说4级":"English Listening&Speaking 4",
        "经济学":"Economic","雅思课程":"IELTS","雅思":"IELTS",
        "AP微积分":"AP Calculus","AP 预备微积分":"AP Pre-calculus","AP预备微积分":"AP Pre-calculus",
        "AP物理1":"AP Physical 1","AP物理2":"AP Physical 2","AP 美术":"AP Arts","AP美术":"AP Arts",
        "AP生物":"AP Biology","AP心理学":"AP Psychology","AP化学":"AP Chemistry"
    };
    function getSubjectDisplay(subjectName) {
        const english = subjectMap[subjectName] || subjectName;
        return `${subjectName} / ${english}`;
    }

    // 学期配置
    const SEMESTER_CONFIG = [
        { gradeLabel: "九年级", semesterLabel: "第一学期", idx:0 },
        { gradeLabel: "九年级", semesterLabel: "第二学期", idx:1 },
        { gradeLabel: "十年级", semesterLabel: "第一学期", idx:2 },
        { gradeLabel: "十年级", semesterLabel: "第二学期", idx:3 },
        { gradeLabel: "十一年级", semesterLabel: "第一学期", idx:4 },
        { gradeLabel: "十一年级", semesterLabel: "第二学期", idx:5 }
    ];

    // 全局存储
    let semestersData = [null, null, null, null, null, null];
    let mergedStudentMatrix = new Map();  // studentName -> { subject: [score0..5] }
    let studentList = [];
    let currentStudent = null;
    let studentDetails = new Map(); // name -> { pinyin, gender, birth, idNo, startEnd }

    // DOM 元素
    const semesterUploadsDiv = document.getElementById('semesterUploads');
    const studentSelect = document.getElementById('studentSelect');
    const previewContainer = document.getElementById('previewContainer');
    const messageBox = document.getElementById('messageBox');
    const stuNameInput = document.getElementById('stuName');
    const stuPinyinInput = document.getElementById('stuPinyin');
    const stuGenderSelect = document.getElementById('stuGender');
    const stuBirthInput = document.getElementById('stuBirth');
    const stuIdInput = document.getElementById('stuId');
    const stuDurationInput = document.getElementById('stuDuration');

    // 辅助函数：从单元格中提取数字分数
    function extractNumberScore(value) {
        if (value === null || value === undefined || value === "") return null;
        let str = value.toString().trim();
        if (str === "") return null;
        let num = parseFloat(str);
        if (!isNaN(num) && isFinite(num)) {
            if (num >= 0 && num <= 100) return num;
            if (num > 100 && num <= 120) return num;
        }
        let match = str.match(/(\d+(?:\.\d+)?)/);
        if (match) {
            let extracted = parseFloat(match[1]);
            if (!isNaN(extracted) && extracted >= 0 && extracted <= 120) return extracted;
        }
        return null;
    }

    // 解析班级成绩单Excel（多行学生，多列科目）
    async function parseClassGradeSheet(file, nameColumnCustom) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: "array" });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                    if (!rows || rows.length === 0) reject(new Error("表格无数据"));
                    const columns = Object.keys(rows[0]);
                    
                    let nameCol = null;
                    if (nameColumnCustom && nameColumnCustom.trim()) {
                        nameCol = columns.find(c => c === nameColumnCustom.trim()) || 
                                  columns.find(c => c.toLowerCase() === nameColumnCustom.trim().toLowerCase());
                    }
                    if (!nameCol) {
                        const candidates = ["学生姓名", "姓名", "中文名", "name", "StudentName", "学生"];
                        nameCol = columns.find(c => candidates.includes(c)) || 
                                  columns.find(c => c.includes("姓名") || c.toLowerCase().includes("name"));
                    }
                    if (!nameCol) nameCol = columns[0];
                    
                    const gradeColumns = columns.filter(col => {
                        const lower = col.toLowerCase();
                        return (lower.includes("成绩") || lower.includes("分数") || lower.includes("得分")) &&
                               !lower.includes("绩点") && !lower.includes("gpa") && !lower.includes("学分") &&
                               !lower.includes("等级") && !lower.includes("评语");
                    });
                    
                    const studentScoreMap = new Map();
                    for (const row of rows) {
                        let studentName = row[nameCol];
                        if (!studentName || (typeof studentName === 'string' && !studentName.trim())) continue;
                        studentName = String(studentName).trim();
                        if (!studentScoreMap.has(studentName)) studentScoreMap.set(studentName, new Map());
                        const subjMap = studentScoreMap.get(studentName);
                        for (const col of gradeColumns) {
                            let scoreVal = extractNumberScore(row[col]);
                            if (scoreVal !== null) {
                                let subject = col.replace(/成绩$|分数$|得分$/g, "").trim();
                                if (subject) subjMap.set(subject, scoreVal);
                            }
                        }
                    }
                    for (let [name, map] of studentScoreMap.entries()) {
                        if (map.size === 0) studentScoreMap.delete(name);
                    }
                    if (studentScoreMap.size === 0) reject(new Error("未找到有效成绩数据，请确保有包含“成绩/分数”的列且数值在0-100之间"));
                    resolve({ studentScoresMap: studentScoreMap, nameColUsed: nameCol });
                } catch(err) {
                    reject(err);
                }
            };
            reader.onerror = () => reject(new Error("文件读取失败"));
            reader.readAsArrayBuffer(file);
        });
    }

    // 将 MM-DD-YYYY 转为中文年月日，例如 "2009年5月4日"
    function formatChineseBirthday(dateStr) {
        let mmddyyyy = formatToMMDDYYYY(dateStr);
        let parts = mmddyyyy.split('-');
        let month = parseInt(parts[0], 10);
        let day = parseInt(parts[1], 10);
        let year = parts[2];
        return `${year}年${month}月${day}日`;
    }

    // 将 MM-DD-YYYY 转为英文格式 "May. 4, 2009"
    function formatEnglishBirthday(dateStr) {
        let mmddyyyy = formatToMMDDYYYY(dateStr);
        let parts = mmddyyyy.split('-');
        let monthNum = parseInt(parts[0], 10);
        let day = parseInt(parts[1], 10);
        let year = parts[2];
        const months = ["Jan.", "Feb.", "Mar.", "Apr.", "May.", "June", "July", "Aug.", "Sep.", "Oct.", "Nov.", "Dec."];
        let monthAbbr = months[monthNum - 1];
        return `${monthAbbr} ${day}, ${year}`;
    }

    // 通用日期格式化：转为 MM-DD-YYYY
    function formatToMMDDYYYY(dateStr) {
        if(!dateStr) return "01-01-2000";
        let str = dateStr.trim();
        if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)) return str;
        let parts = str.split(/[-/年月]/).filter(p=>p.trim());
        if(parts.length===3) {
            let y,m,d;
            if(parts[0].length===4) { y=parts[0]; m=parts[1]; d=parts[2]; }
            else if(parts[2].length===4) { y=parts[2]; m=parts[1]; d=parts[0]; }
            else { y=parts[2]; m=parts[0]; d=parts[1]; }
            if(y && m && d) return `${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}-${y}`;
        }
        return "01-01-2000";
    }

    // 解析起止字符串，支持 "至今" 或 "今"，返回 { startYearMonth, endYearMonth, isOngoing }
    function parseStartEnd(durationStr) {
        let defaultStart = "09-2022", defaultEnd = "07-2025";
        let isOngoing = false;
        if(!durationStr) return { start: defaultStart, end: defaultEnd, isOngoing: false };
        let str = durationStr.trim();
        let startPart = "", endPart = "";
        if(str.includes('至')) {
            let [s, e] = str.split('至');
            startPart = s.trim();
            endPart = e.trim();
        } else {
            startPart = str;
            endPart = "";
        }
        // 判断是否为至今
        if(endPart === "今" || endPart === "至今" || endPart === "now" || endPart === "") {
            isOngoing = true;
            endPart = "";
        }
        // 验证格式: MM-YYYY
        let startValid = /^\d{1,2}-\d{4}$/.test(startPart);
        let endValid = !endPart || /^\d{1,2}-\d{4}$/.test(endPart);
        if (!startValid) startPart = defaultStart;
        if (endPart && !endValid) endPart = defaultEnd;
        if (!endPart && !isOngoing) endPart = defaultEnd;
        return { start: startPart, end: endPart, isOngoing: isOngoing };
    }

    // 将 "MM-YYYY" 转为中文 "2024年9月"
    function formatChineseYearMonth(monthYear) {
        let parts = monthYear.split('-');
        let month = parseInt(parts[0], 10);
        let year = parts[1];
        return `${year}年${month}月`;
    }

    // 将 "MM-YYYY" 转为英文 "Sep. 2024"
    function formatEnglishYearMonth(monthYear) {
        let parts = monthYear.split('-');
        let monthNum = parseInt(parts[0], 10);
        let year = parts[1];
        const months = ["Jan.", "Feb.", "Mar.", "Apr.", "May.", "June", "July", "Aug.", "Sep.", "Oct.", "Nov.", "Dec."];
        let monthAbbr = months[monthNum - 1];
        return `${monthAbbr} ${year}`;
    }

    // 格式化英文签发日期 (用于落款)
    function formatEnglishDate(date) {
        const months = ["Jan.", "Feb.", "Mar.", "Apr.", "May.", "June", "July", "Aug.", "Sep.", "Oct.", "Nov.", "Dec."];
        const month = months[date.getMonth()];
        const day = date.getDate();
        const year = date.getFullYear();
        return `${month} ${day}, ${year}`;
    }

    // 生成完整成绩单HTML（包含Word页面视图指令）
    function generateFullTranscriptHTML(studentName) {
        if(!studentName || !mergedStudentMatrix.has(studentName)) return `<div class="warning">无成绩数据</div>`;
        const subjectScores = mergedStudentMatrix.get(studentName);
        let subjects = Object.keys(subjectScores);
        const order = ["语文","数学","英语","物理","化学","生物","历史","地理","政治","经济","经济学","AP微积分","AP物理1","AP生物","AP心理学","AP化学","美术","音乐","体育","计算机","法语","西班牙语","文学","社会学","雅思课程","英语读写1级","英语读写2级","英语读写3级","英语读写4级","英语听说1级","英语听说2级","英语听说3级","英语听说4级","生物一册","生物二册","语文一册","语文二册"];
        subjects.sort((a,b) => {
            let ia = order.indexOf(a); if(ia===-1) ia=999;
            let ib = order.indexOf(b); if(ib===-1) ib=999;
            if(ia!==ib) return ia-ib;
            return a.localeCompare(b);
        });
        
        let tableRows = '';
        for(let sub of subjects) {
            const scoresArr = subjectScores[sub];
            const displaySub = getSubjectDisplay(sub);
            tableRows += `<tr><td class="subject-name" style="border:1px solid #000; text-align:left; padding:8px;">${displaySub}</td>`;
            for(let s=0;s<6;s++) {
                let val = scoresArr[s];
                let display = (val !== null && val !== undefined && val !== "") ? val : "—";
                tableRows += `<td style="border:1px solid #000; text-align:center; padding:8px;">${display}<\/td>`;
            }
            tableRows += `<\/tr>`;
        }
        
        const details = studentDetails.get(studentName) || {};
        const chineseName = studentName;
        const pinyinName = details.pinyin || (()=>{
            let tmp = chineseName.replace(/[^\u4e00-\u9fa5]/g, '');
            if(tmp.length>=2) return tmp[0]+" "+tmp.slice(1);
            return chineseName;
        })();
        const gender = details.gender || "男";
        const genderEn = gender === '男' ? 'male' : 'female';
        
        const rawBirth = details.birth || "05-20-2008";
        const birthChinese = formatChineseBirthday(rawBirth);
        const birthEnglish = formatEnglishBirthday(rawBirth);
        
        const idNo = details.idNo || "XXXXXXXXXXXXXXXXX";
        let durationRaw = details.startEnd || "09-2022 至 07-2025";
        const { start, end, isOngoing } = parseStartEnd(durationRaw);
        const startChinese = formatChineseYearMonth(start);
        const endChinese = isOngoing ? "至今" : formatChineseYearMonth(end);
        const startEnglish = formatEnglishYearMonth(start);
        const endEnglish = isOngoing ? "till now" : formatEnglishYearMonth(end);
        
        const certifyChinese = `兹证明: ${chineseName}，${gender}，出生日期 ${birthChinese}，身份证号: ${idNo}，自 ${startChinese} 至 ${endChinese} 在我校就读。其学习成绩如下：`;
        const certifyEnglish = `This is to certify that ${pinyinName}, ${genderEn}, born on ${birthEnglish}, ID NO.: ${idNo}, has studied in our school since ${startEnglish} ${endEnglish}. The grades are as follows:`;
        
        const now = new Date();
        const englishIssueDate = formatEnglishDate(now);
        
        const footerHtml = `
        <div class="school-footer">
            <div>
                <div>北京市朝阳区北外同文外国语学校</div>
                <div>Beijing Chaoyang Tongwen Foreign Language School</div>
                <div>Issued: ${englishIssueDate}</div>
            </div>
        </div>`;
        
        // 添加Word页面视图指令（Print Layout）
        const wordViewInstruction = `<!--[if gte mso 9]>
<xml>
 <w:WordDocument>
  <w:View>Print</w:View>
  <w:Zoom>100</w:Zoom>
 </w:WordDocument>
</xml>
<![endif]-->`;
        
        return `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8">${wordViewInstruction}<title>${chineseName}_成绩单</title>
        <style>
            body { font-family: 'Times New Roman', '宋体', SimSun, serif; margin: 1.5cm 1.8cm; background: white; }
            .full-transcript { max-width: 1200px; margin: 0 auto; }
            h1 { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 6px; }
            .eng-title { text-align: center; font-size: 16px; margin-bottom: 24px; }
            .certify-text { margin: 20px 0 24px; font-size: 13px; line-height: 1.6; color: #1e293b; }
            .transcript-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
            .transcript-table th, .transcript-table td { border: 1px solid #000000; padding: 8px 6px; vertical-align: middle; text-align: center; }
            .transcript-table th { background-color: #eef3fc; font-weight: 700; }
            .subject-name { font-weight: 600; text-align: left; }
            .note { font-size: 10px; text-align: center; margin: 12px 0; }
            .school-footer { margin-top: 28px; border-top: 1px dashed #cbd5e1; padding-top: 18px; display: flex; justify-content: flex-end; text-align: right; }
        </style>
        </head>
        <body>
        <div class="full-transcript">
            <h1>学生成绩登记表</h1>
            <div class="eng-title">Student Academic Report</div>
            <div class="certify-text">${certifyChinese}<br>${certifyEnglish}</div>
            <table class="transcript-table">
                <thead><tr><th rowspan="2">科目 Subject</th><th colspan="2">九年级 Grade 9</th><th colspan="2">十年级 Grade 10</th><th colspan="2">十一年级 Grade 11</th></tr>
                <tr><th>第一学期<br>1st semester</th><th>第二学期<br>2nd semester</th><th>第一学期<br>1st semester</th><th>第二学期<br>2nd semester</th><th>第一学期<br>1st semester</th><th>第二学期<br>2nd semester</th></tr></thead>
                <tbody>${tableRows}</tbody>
            </table>
            <div class="note">说明(Note)：满分百分制(Full Mark is 100.) ｜ 仅录入列名包含「成绩」的分数，绩点/学分等已自动过滤</div>
            ${footerHtml}
        </div>
        </body>
        </html>`;
    }

    // 合并所有学期数据
    function mergeAllSemestersAndRefresh() {
        mergedStudentMatrix.clear();
        const tempMatrix = new Map();
        for(let semIdx=0; semIdx<6; semIdx++) {
            const semMap = semestersData[semIdx];
            if(!semMap) continue;
            for(let [studentName, subjectScoreMap] of semMap.entries()) {
                if(!tempMatrix.has(studentName)) tempMatrix.set(studentName, new Map());
                const studentSubjects = tempMatrix.get(studentName);
                for(let [subject, score] of subjectScoreMap.entries()) {
                    if(!studentSubjects.has(subject)) {
                        const arr = Array(6).fill(null);
                        studentSubjects.set(subject, arr);
                    }
                    const arr = studentSubjects.get(subject);
                    arr[semIdx] = score;
                }
            }
        }
        for(let [stuName, subjectMap] of tempMatrix.entries()) {
            const finalSubjectMap = {};
            for(let [sub, arr] of subjectMap.entries()) {
                finalSubjectMap[sub] = arr;
            }
            mergedStudentMatrix.set(stuName, finalSubjectMap);
            if(!studentDetails.has(stuName)) {
                studentDetails.set(stuName, { pinyin: "", gender: "男", birth: "05-20-2008", idNo: "XXXXXXXXXXXXXXXXX", startEnd: "09-2022 至 07-2025" });
            }
        }
        studentList = Array.from(mergedStudentMatrix.keys()).sort();
        updateStudentSelect();
        if(studentList.length>0) {
            if(!currentStudent || !studentList.includes(currentStudent)) currentStudent = studentList[0];
            studentSelect.value = currentStudent;
            syncStudentInfoToPanel(currentStudent);
            renderPreviewForStudent(currentStudent);
        } else {
            previewContainer.innerHTML = '<div class="warning">暂无有效学生数据，请至少上传一个学期的有效成绩表。</div>';
            studentSelect.innerHTML = '<option disabled>无学生数据</option>';
            studentSelect.disabled = true;
        }
    }

    function updateStudentSelect() {
        studentSelect.innerHTML = '';
        if(studentList.length === 0) {
            studentSelect.disabled = true;
            studentSelect.innerHTML = '<option>暂无学生</option>';
            return;
        }
        studentSelect.disabled = false;
        for(let name of studentList) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            studentSelect.appendChild(opt);
        }
        if(currentStudent) studentSelect.value = currentStudent;
    }

    function syncStudentInfoToPanel(studentName) {
        if(!studentName) return;
        const details = studentDetails.get(studentName) || {};
        stuNameInput.value = studentName;
        stuPinyinInput.value = details.pinyin || (()=>{
            let simple = studentName.replace(/[^\u4e00-\u9fa5]/g, '');
            if(simple.length>=2) return simple[0]+" "+simple.slice(1);
            return studentName;
        })();
        stuGenderSelect.value = details.gender || "男";
        stuBirthInput.value = details.birth || "05-20-2008";
        stuIdInput.value = details.idNo || "410************001";
        stuDurationInput.value = details.startEnd || "09-2022 至 07-2025";
    }

    function saveCurrentStudentDetails() {
        if(!currentStudent) return;
        let cur = studentDetails.get(currentStudent) || {};
        cur.pinyin = stuPinyinInput.value.trim();
        cur.gender = stuGenderSelect.value;
        cur.birth = stuBirthInput.value.trim();
        cur.idNo = stuIdInput.value.trim();
        cur.startEnd = stuDurationInput.value.trim();
        studentDetails.set(currentStudent, cur);
    }

    function renderPreviewForStudent(studentName) {
        if(!studentName || !mergedStudentMatrix.has(studentName)) {
            previewContainer.innerHTML = '<div class="warning">请选择有效学生</div>';
            return;
        }
        const htmlContent = generateFullTranscriptHTML(studentName);
        const match = htmlContent.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        if(match) {
            previewContainer.innerHTML = match[1];
        } else {
            previewContainer.innerHTML = htmlContent;
        }
    }

    async function handleSemesterFileUpload(event) {
        const file = event.target.files[0];
        const semIdx = parseInt(event.target.getAttribute('data-semester'));
        const statusDiv = document.getElementById(`fileStatus_${semIdx}`);
        if(!file) {
            semestersData[semIdx] = null;
            statusDiv.innerText = "未上传";
            mergeAllSemestersAndRefresh();
            return;
        }
        statusDiv.innerText = "解析中...";
        try {
            const { studentScoresMap } = await parseClassGradeSheet(file, null);
            semestersData[semIdx] = studentScoresMap;
            statusDiv.innerText = `✓ ${studentScoresMap.size} 名学生`;
            statusDiv.classList.remove('error');
            mergeAllSemestersAndRefresh();
            showMessage(`成功导入 ${SEMESTER_CONFIG[semIdx].gradeLabel} ${SEMESTER_CONFIG[semIdx].semesterLabel} (${studentScoresMap.size}人)`, "success");
        } catch(err) {
            semestersData[semIdx] = null;
            statusDiv.innerText = `❌ 解析失败`;
            statusDiv.classList.add('error');
            showMessage(`${SEMESTER_CONFIG[semIdx].gradeLabel} ${SEMESTER_CONFIG[semIdx].semesterLabel}: ${err.message.substring(0, 150)}`, "error");
            mergeAllSemestersAndRefresh();
        }
    }

    function buildUploadUI() {
        semesterUploadsDiv.innerHTML = '';
        for(let i=0; i<SEMESTER_CONFIG.length; i++) {
            const sem = SEMESTER_CONFIG[i];
            const card = document.createElement('div');
            card.className = 'semester-card';
            card.innerHTML = `<label>${sem.gradeLabel} ${sem.semesterLabel}<span class="badge">学期 ${i+1}/6</span></label>
                              <input type="file" accept=".xlsx, .xls, .csv" data-semester="${i}" class="semester-file" />
                              <div class="file-status" id="fileStatus_${i}">未上传</div>`;
            semesterUploadsDiv.appendChild(card);
        }
        document.querySelectorAll('.semester-file').forEach(inp => inp.addEventListener('change', handleSemesterFileUpload));
    }

    async function batchExportAllZip() {
        if(studentList.length===0) { showMessage("无学生数据","error"); return; }
        const zip = new JSZip();
        let toast = document.createElement('div'); toast.className='progress-toast'; toast.innerText=`⏳ 打包中 0/${studentList.length}`; document.body.appendChild(toast);
        for(let i=0;i<studentList.length;i++) {
            const stu = studentList[i];
            const html = generateFullTranscriptHTML(stu);
            const safe = stu.replace(/[\\/:*?"<>|]/g,'_');
            zip.file(`${safe}_成绩单.doc`, html);
            toast.innerText = `📦 打包中 ${i+1}/${studentList.length}`;
            await new Promise(r=>setTimeout(r,10));
        }
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, `全班成绩单_${studentList.length}人.zip`);
        toast.innerText = `✅ 导出完成！共 ${studentList.length} 份`;
        setTimeout(()=>toast.remove(),3000);
    }

    // 事件绑定
    document.getElementById('exportWordBtn').addEventListener('click', () => {
        if(!currentStudent) { showMessage("请选择学生","error"); return; }
        const html = generateFullTranscriptHTML(currentStudent);
        const blob = new Blob([html], {type:"application/msword"});
        saveAs(blob, `${currentStudent}_成绩单.doc`);
        showMessage("导出成功","success");
    });
    document.getElementById('batchExportZipBtn').addEventListener('click', batchExportAllZip);
    document.getElementById('printPreviewBtn').addEventListener('click', ()=>window.print());
    document.getElementById('refreshAllBtn').addEventListener('click', ()=>{ mergeAllSemestersAndRefresh(); showMessage("已刷新","success"); });
    document.getElementById('resetAllBtn').addEventListener('click', ()=>{
        semestersData = [null,null,null,null,null,null];
        for(let i=0;i<6;i++) { let d=document.getElementById(`fileStatus_${i}`); if(d){d.innerText="未上传"; d.classList.remove('error');} let inp=document.querySelector(`.semester-file[data-semester="${i}"]`); if(inp) inp.value=''; }
        mergedStudentMatrix.clear(); studentList=[]; updateStudentSelect(); previewContainer.innerHTML='<div class="warning">已清空所有数据</div>'; currentStudent=null; showMessage("已重置","info");
    });
    document.getElementById('updateStudentInfoBtn').addEventListener('click', ()=>{
        if(currentStudent) { saveCurrentStudentDetails(); renderPreviewForStudent(currentStudent); showMessage("学生信息已更新","success"); }
    });
    studentSelect.addEventListener('change', (e)=>{
        if(currentStudent) saveCurrentStudentDetails();
        currentStudent = e.target.value;
        syncStudentInfoToPanel(currentStudent);
        renderPreviewForStudent(currentStudent);
    });
    function showMessage(msg, type="info") {
        const msgDiv = document.getElementById('messageBox');
        const className = type === "error" ? "warning" : (type === "success" ? "success-msg" : "info-bar");
        msgDiv.innerHTML = `<div class="${className}" style="padding:8px 16px; border-radius:28px;">${msg}</div>`;
        setTimeout(()=>{ if(msgDiv.firstChild) msgDiv.innerHTML=''; }, 4000);
    }
    buildUploadUI();
    mergeAllSemestersAndRefresh();
</script>
</body>
</html>
